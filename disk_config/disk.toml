[[customizations.filesystem]]
mountpoint = "/"
minsize = "20 GiB"

# Pre-baked user for the qcow2 VM image so it boots straight into a usable
# system (the ISO installer creates its own user interactively instead).
# useradd copies /etc/skel, so this account gets the niri/noctalia configs.
# ⚠️ Throwaway test credentials — change or remove before any real use.
[[customizations.user]]
name = "niri"
password = "niri"
groups = ["wheel"]
