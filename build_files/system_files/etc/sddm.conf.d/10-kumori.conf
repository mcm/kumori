# Kumori SDDM configuration.
# The Wayland greeter (DisplayServer=wayland + weston kiosk compositor) is set
# up by the sddm-wayland-generic package's drop-in; we only select the theme.
# niri is the only entry in /usr/share/wayland-sessions, so it's the default
# session with nothing else to configure.
[Theme]
Current=precision-overcast
CursorTheme=Adwaita
CursorSize=24

[General]
# SDDM ignores [Theme] CursorTheme in Wayland mode (sddm#1996/#2076).
GreeterEnvironment=XCURSOR_THEME=Adwaita,XCURSOR_SIZE=24

[Wayland]
# The cursor is drawn by the greeter's weston compositor, which reads
# XCURSOR_THEME from ITS environment — and GreeterEnvironment doesn't reach it.
# So inject the env directly into weston (default CompositorCommand is
# "weston --shell=kiosk").
CompositorCommand=env XCURSOR_THEME=Adwaita XCURSOR_SIZE=24 weston --shell=kiosk
