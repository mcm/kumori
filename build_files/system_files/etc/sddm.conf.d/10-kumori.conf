# Kumori SDDM configuration.
#
# The Wayland greeter runs on cage, a tiny wlroots-based kiosk compositor, NOT
# weston (the sddm-wayland-generic default). Why: in Wayland the pointer cursor
# is the *client's* responsibility, and weston's kiosk-shell draws no fallback.
# The Qt greeter never sets a cursor, so a weston login screen has a working but
# invisible pointer (hover states change, no cursor is ever painted). cage uses
# wlroots, which draws a compositor-side cursor unconditionally (seat.c:133), so
# the pointer is visible no matter what the client does.
#
# SDDM launches the greeter as a separate Wayland client into whatever compositor
# we name here -- it just starts the CompositorCommand, waits for a wayland-N
# socket to appear, then connects the greeter to it. `cage` with NO app argument
# skips spawning a primary client (cage.c:623) and runs as exactly that kind of
# persistent bare compositor. `-s` keeps VT switching (Ctrl+Alt+F-keys) working.
#
# SDDM exports [Theme] CursorTheme/CursorSize as XCURSOR_THEME/XCURSOR_SIZE into
# the compositor's environment, and cage's wlroots xcursor manager honors them
# (NULL theme name => reads XCURSOR_THEME), so theming the cursor needs nothing
# beyond the [Theme] keys below -- no env wrapper, no GreeterEnvironment.
#
# niri is the only entry in /usr/share/wayland-sessions, so it is the default
# session with nothing else to configure.

[General]
DisplayServer=wayland

[Theme]
Current=precision-overcast
CursorTheme=Adwaita
CursorSize=48

[Wayland]
CompositorCommand=cage -s
